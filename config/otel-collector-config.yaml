# ==============================================================================
# OpenTelemetry Collector Configuration
# ==============================================================================
# Used by docker-compose.infra.yml for local development.
# Receives OTLP data from Java services, exports traces to Jaeger
# and metrics to Prometheus scrape endpoint. Do not enable the debug
# exporter in default environments because trace payloads can contain
# sensitive request metadata.

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 5s
    send_batch_size: 1024

exporters:
  otlp/jaeger:
    endpoint: jaeger:4317
    tls:
      insecure: true

  prometheus:
    endpoint: 0.0.0.0:8889
    namespace: otel

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp/jaeger]
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [prometheus]
