apiVersion: apps/v1
kind: Deployment
metadata:
  name: monitor-notification-service
  namespace: monitor-system
  labels:
    app: monitor-notification-service
    version: v1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: monitor-notification-service
  template:
    metadata:
      labels:
        app: monitor-notification-service
        version: v1
      annotations:
        sidecar.istio.io/inject: "true"
        prometheus.io/scrape: "true"
        prometheus.io/port: "8083"
        prometheus.io/path: "/actuator/prometheus"
    spec:
      serviceAccountName: monitor-notification-service
      containers:
      - name: notification-service
        image: monitor/notification-service:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8083
          name: http
        env:
        - name: SPRING_PROFILES_ACTIVE
          valueFrom:
            configMapKeyRef:
              name: monitor-config
              key: SPRING_PROFILES_ACTIVE
        - name: JAVA_OPTS
          valueFrom:
            configMapKeyRef:
              name: monitor-config
              key: JAVA_OPTS
        - name: SPRING_DATASOURCE_URL
          value: "jdbc:mysql://mysql-service:3306/monitor_system?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC"
        - name: SPRING_DATASOURCE_USERNAME
          valueFrom:
            configMapKeyRef:
              name: monitor-config
              key: MYSQL_USERNAME
        - name: SPRING_DATASOURCE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: monitor-secrets
              key: MYSQL_PASSWORD
        - name: SPRING_REDIS_HOST
          valueFrom:
            configMapKeyRef:
              name: monitor-config
              key: REDIS_HOST
        - name: SPRING_REDIS_PORT
          valueFrom:
            configMapKeyRef:
              name: monitor-config
              key: REDIS_PORT
        - name: SPRING_RABBITMQ_HOST
          valueFrom:
            configMapKeyRef:
              name: monitor-config
              key: RABBITMQ_HOST
        - name: SPRING_RABBITMQ_PORT
          valueFrom:
            configMapKeyRef:
              name: monitor-config
              key: RABBITMQ_PORT
        - name: SPRING_RABBITMQ_USERNAME
          valueFrom:
            configMapKeyRef:
              name: monitor-config
              key: RABBITMQ_USERNAME
        - name: SPRING_RABBITMQ_PASSWORD
          valueFrom:
            secretKeyRef:
              name: monitor-secrets
              key: RABBITMQ_PASSWORD
        - name: SPRING_SLEUTH_ZIPKIN_BASE_URL
          valueFrom:
            configMapKeyRef:
              name: monitor-config
              key: SPRING_SLEUTH_ZIPKIN_BASE_URL
        - name: SPRING_SLEUTH_SAMPLER_PROBABILITY
          valueFrom:
            configMapKeyRef:
              name: monitor-config
              key: SPRING_SLEUTH_SAMPLER_PROBABILITY
        - name: MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE
          valueFrom:
            configMapKeyRef:
              name: monitor-config
              key: MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE
        - name: MANAGEMENT_METRICS_EXPORT_PROMETHEUS_ENABLED
          valueFrom:
            configMapKeyRef:
              name: monitor-config
              key: MANAGEMENT_METRICS_EXPORT_PROMETHEUS_ENABLED
        - name: NOTIFICATION_EMAIL_ENABLED
          valueFrom:
            configMapKeyRef:
              name: monitor-config
              key: NOTIFICATION_EMAIL_ENABLED
        - name: NOTIFICATION_SMS_ENABLED
          valueFrom:
            configMapKeyRef:
              name: monitor-config
              key: NOTIFICATION_SMS_ENABLED
        livenessProbe:
          httpGet:
            path: /actuator/health/liveness
            port: 8083
          initialDelaySeconds: 120
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /actuator/health/readiness
            port: 8083
          initialDelaySeconds: 60
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
        volumeMounts:
        - name: tmp-volume
          mountPath: /tmp
        - name: logs-volume
          mountPath: /app/logs
      volumes:
      - name: tmp-volume
        emptyDir: {}
      - name: logs-volume
        emptyDir: {}

---
apiVersion: v1
kind: Service
metadata:
  name: monitor-notification-service
  namespace: monitor-system
  labels:
    app: monitor-notification-service
spec:
  selector:
    app: monitor-notification-service
  ports:
  - port: 8083
    targetPort: 8083
    name: http
  type: ClusterIP

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: monitor-notification-service-hpa
  namespace: monitor-system
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: monitor-notification-service
  minReplicas: 2
  maxReplicas: 8
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 10
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60