apiVersion: apps/v1
kind: Deployment
metadata:
  name: monitor-web-dashboard
  namespace: monitor-system
  labels:
    app: monitor-web-dashboard
    version: v1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: monitor-web-dashboard
  template:
    metadata:
      labels:
        app: monitor-web-dashboard
        version: v1
      annotations:
        sidecar.istio.io/inject: "true"
    spec:
      serviceAccountName: monitor-web-dashboard
      containers:
      - name: web-dashboard
        image: monitor/web-dashboard:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 80
          name: http
        env:
        - name: API_GATEWAY_URL
          valueFrom:
            configMapKeyRef:
              name: monitor-config
              key: API_GATEWAY_URL
        - name: WEBSOCKET_URL
          valueFrom:
            configMapKeyRef:
              name: monitor-config
              key: WEBSOCKET_URL
        - name: ENVIRONMENT
          valueFrom:
            configMapKeyRef:
              name: monitor-config
              key: ENVIRONMENT
        livenessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 30
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"
        securityContext:
          runAsNonRoot: true
          runAsUser: 1001
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
        volumeMounts:
        - name: nginx-cache
          mountPath: /var/cache/nginx
        - name: nginx-run
          mountPath: /var/run
        - name: nginx-logs
          mountPath: /var/log/nginx
      volumes:
      - name: nginx-cache
        emptyDir: {}
      - name: nginx-run
        emptyDir: {}
      - name: nginx-logs
        emptyDir: {}

---
apiVersion: v1
kind: Service
metadata:
  name: monitor-web-dashboard-service
  namespace: monitor-system
  labels:
    app: monitor-web-dashboard
spec:
  selector:
    app: monitor-web-dashboard
  ports:
  - port: 80
    targetPort: 80
    name: http
  type: ClusterIP

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: monitor-web-dashboard-hpa
  namespace: monitor-system
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: monitor-web-dashboard
  minReplicas: 2
  maxReplicas: 6
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 10
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60