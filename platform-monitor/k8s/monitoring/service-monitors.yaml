apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: monitor-services
  namespace: monitor-system
  labels:
    app: monitor-services
spec:
  selector:
    matchLabels:
      prometheus.io/scrape: "true"
  endpoints:
  - port: http
    path: /actuator/prometheus
    interval: 15s
    scrapeTimeout: 10s
    honorLabels: true
  namespaceSelector:
    matchNames:
    - monitor-system

---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: monitor-api-gateway
  namespace: monitor-system
  labels:
    app: monitor-api-gateway
spec:
  selector:
    matchLabels:
      app: monitor-api-gateway
  endpoints:
  - port: http
    path: /actuator/prometheus
    interval: 10s
    scrapeTimeout: 8s
    relabelings:
    - sourceLabels: [__meta_kubernetes_service_name]
      targetLabel: service
    - sourceLabels: [__meta_kubernetes_namespace]
      targetLabel: namespace
    - sourceLabels: [__meta_kubernetes_pod_name]
      targetLabel: pod
  namespaceSelector:
    matchNames:
    - monitor-system

