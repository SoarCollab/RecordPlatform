server:
  port: 0

spring:
  application:
    name: monitor-notification-service-test
    
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password: 
    
  h2:
    console:
      enabled: true
      
  redis:
    host: localhost
    port: 6379
    database: 15
    timeout: 2000ms
    
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    virtual-host: /test
    
  mail:
    host: localhost
    port: 25
    username: test@example.com
    password: test-password

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.nop.NopImpl
  global-config:
    db-config:
      id-type: auto

logging:
  level:
    cn.flying.monitor: DEBUG
    org.springframework.mail: DEBUG
    
# Test-specific configurations
test:
  notification:
    email:
      enabled: false
    sms:
      enabled: false
    webhook:
      enabled: false