server:
  port: 8080

spring:
  application:
    name: monitor-api-gateway
  
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: lb://monitor-auth-service
          predicates:
            - Path=/api/v2/auth/**
          filters:
            - StripPrefix=2
            
        - id: data-service
          uri: lb://monitor-data-service
          predicates:
            - Path=/api/v2/data/**
          filters:
            - StripPrefix=2
            
        - id: notification-service
          uri: lb://monitor-notification-service
          predicates:
            - Path=/api/v2/notifications/**
          filters:
            - StripPrefix=2
            
        - id: websocket-service
          uri: lb://monitor-websocket-service
          predicates:
            - Path=/api/v2/ws/**
          filters:
            - StripPrefix=2
      
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOriginPatterns: "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true
            maxAge: 3600

  redis:
    host: localhost
    port: 6379
    database: 0
    timeout: 2000ms
    lettuce:
      pool:
        max-active: 8
        max-idle: 8
        min-idle: 0

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,gateway
  endpoint:
    health:
      show-details: always
    metrics:
      enabled: true
    prometheus:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: true
        step: 10s
      influx:
        enabled: false
    distribution:
      percentiles-histogram:
        http.server.requests: true
        spring.cloud.gateway.requests: true
      percentiles:
        http.server.requests: 0.5, 0.95, 0.99
        spring.cloud.gateway.requests: 0.5, 0.95, 0.99
    tags:
      application: monitor-api-gateway
      service: api-gateway
  tracing:
    enabled: true
    sampling:
      probability: 0.1
    zipkin:
      endpoint: http://localhost:9411/api/v2/spans

logging:
  level:
    cn.flying.monitor: DEBUG
    org.springframework.cloud.gateway: DEBUG