server:
  port: 0

spring:
  application:
    name: monitor-websocket-service-test
    
  redis:
    host: localhost
    port: 6379
    database: 15
    timeout: 2000ms
    lettuce:
      pool:
        max-active: 8
        max-idle: 8
        min-idle: 0

  # 测试环境数据源配置
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: 
    
  h2:
    console:
      enabled: true

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true

# JWT配置
jwt:
  secret: test-secret-key-for-websocket-service-testing-only
  expiration: 86400

# 日志配置
logging:
  level:
    cn.flying.monitor: DEBUG
    org.springframework.web.socket: DEBUG
    org.springframework.security: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# 测试配置
test:
  websocket:
    connection-timeout: 5000
    message-timeout: 10000
    performance:
      concurrent-connections: 50
      message-count: 1000
      test-duration: 30