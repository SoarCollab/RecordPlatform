spring:
  mail:
    host: ${MAIL_HOST:smtp.163.com}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    port: ${MAIL_PORT:465}
    protocol: smtps
    properties:
      from: ${MAIL_USERNAME}
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          ssl:
            enable: true
          socketFactory:
            class: javax.net.ssl.SSLSocketFactory
            fallback: false
          timeout: 10000
          connectiontimeout: 10000
  rabbitmq:
    addresses: ${RABBITMQ_HOST}
    stream:
      port: 5672
    username: ${RABBITMQ_USERNAME}
    password: ${RABBITMQ_PASSWORD}
    virtual-host: ${RABBITMQ_VIRTUAL_HOST:/}
  data:
    redis:
      database: 0
      host: ${REDIS_HOST}
      port: 6379
      timeout: 5000
      username: ${REDIS_USERNAME:default}
      password: ${REDIS_PASSWORD}

platform:
  identity:
    security:
      allowed-origins:
        - ${IDENTITY_ALLOWED_ORIGIN_PRIMARY:https://identity.example.com}
      allowed-origin-patterns:
        - ${IDENTITY_ALLOWED_ORIGIN_PATTERN:}
      allow-credentials: ${IDENTITY_CORS_ALLOW_CREDENTIALS:true}
      max-age: ${IDENTITY_CORS_MAX_AGE:600}
