name: Docs Consistency

on:
  pull_request:
    paths:
      - 'README.md'
      - 'README_CN.md'
      - 'API_DOCUMENTATION.md'
      - 'TESTING.md'
      - 'docs/**'
      - 'scripts/*.md'
      - 'tools/k6/README.md'
      - 'tools/docs/**'
      - '.env.example'
      - 'platform-frontend/.env.example'
      - 'scripts/env.sh'
      - 'platform-backend/backend-web/src/main/java/cn/flying/controller/**'
      - 'platform-backend/backend-web/src/main/java/cn/flying/config/**'
      - 'platform-backend/backend-web/src/main/resources/application*.yml'
      - 'platform-backend/backend-web/src/main/resources/db/migration/**'
      - 'platform-backend/backend-service/src/main/java/**'
      - 'platform-backend/**/src/test/java/**'
      - '.github/workflows/*.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  export-openapi:
    name: Export OpenAPI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Install platform-api
        run: mvn -f platform-api/pom.xml clean install -DskipTests -q

      - name: Export OpenAPI
        run: >-
          mvn -f platform-backend/pom.xml
          -pl backend-web
          -am
          -Dtest=OpenApiContractExportTest
          -Dsurefire.failIfNoSpecifiedTests=false
          test

      - name: Upload OpenAPI artifact
        uses: actions/upload-artifact@v7
        with:
          name: backend-openapi
          path: platform-backend/backend-web/target/openapi/openapi.json
          if-no-files-found: error

  docs-consistency:
    name: Check Docs Consistency
    runs-on: ubuntu-latest
    needs: export-openapi
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download OpenAPI artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-openapi
          path: platform-backend/backend-web/target/openapi

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run consistency checks
        run: python3 tools/docs/check_consistency.py --check-routes --check-env

  docs-build:
    name: Build Docs Site
    runs-on: ubuntu-latest
    needs: docs-consistency
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: docs/pnpm-lock.yaml

      - name: Install docs dependencies
        run: pnpm -C docs install --frozen-lockfile

      - name: Build docs
        run: pnpm -C docs docs:build
