name: Test Suite

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'platform-api/**'
              - 'platform-backend/**'
              - 'platform-fisco/**'
              - 'platform-storage/**'
              - 'pom.xml'
              - '.github/workflows/**'
            frontend:
              - 'platform-frontend/**'
              - '.github/workflows/**'

  backend-test:
    name: Backend Tests
    needs: [changes]
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'

      - name: Install platform-api
        run: mvn -f platform-api/pom.xml clean install -DskipTests -q

      - name: Run Backend Tests
        run: mvn -f platform-backend/pom.xml clean verify -pl backend-common,backend-service,backend-web -am -Pit

      - name: Run FISCO Tests
        run: mvn -f platform-fisco/pom.xml test

      - name: Run Storage Tests
        run: mvn -f platform-storage/pom.xml test

      - name: Upload Backend OpenAPI Artifact
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: backend-openapi
          path: platform-backend/backend-web/target/openapi/openapi.json
          if-no-files-found: error

      - name: Upload Backend Coverage Report
        uses: codecov/codecov-action@v4
        if: always()
        with:
          use_oidc: true
          files: |
            platform-backend/backend-common/target/site/jacoco/jacoco.xml
            platform-backend/backend-service/target/site/jacoco/jacoco.xml
            platform-backend/backend-web/target/site/jacoco/jacoco.xml
          flags: backend
          fail_ci_if_error: false

  frontend-test:
    name: Frontend Tests
    needs: [changes]
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        working-directory: platform-frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: platform-frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check Formatting
        run: pnpm format:check

      - name: Run Lint
        run: pnpm lint

      - name: Run Type Check
        run: pnpm check

      - name: Run Tests with Coverage
        run: pnpm test:coverage

      - name: Upload Frontend Coverage Report
        uses: codecov/codecov-action@v4
        if: always()
        with:
          use_oidc: true
          files: platform-frontend/coverage/lcov.info
          flags: frontend
          fail_ci_if_error: false

  contract-consistency:
    name: Contract Consistency
    runs-on: ubuntu-latest
    needs: [changes, backend-test]
    if: needs.changes.outputs.backend == 'true'
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Backend OpenAPI Artifact
        uses: actions/download-artifact@v8
        with:
          name: backend-openapi
          path: backend-openapi

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: platform-frontend/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: platform-frontend
        run: pnpm install --frozen-lockfile

      - name: Generate And Verify Frontend API Types
        working-directory: platform-frontend
        run: OPENAPI_SOURCE=../backend-openapi/openapi.json pnpm types:gen:check

      - name: Generate Contract Fingerprints
        run: |
          mkdir -p contract-fingerprint
          shasum -a 256 backend-openapi/openapi.json | awk '{print $1}' > contract-fingerprint/openapi.sha256
          shasum -a 256 platform-frontend/src/lib/api/types/generated.ts | awk '{print $1}' > contract-fingerprint/generated-ts.sha256

      - name: Upload Contract Fingerprints
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: contract-fingerprint
          path: contract-fingerprint
          if-no-files-found: error

  security-scan:
    name: Security Scan
    needs: [changes]
    if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: fs
          scan-ref: .
          format: table
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          vuln-type: os,library
          exit-code: '0'

      - name: Run Trivy SARIF output
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-pr.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          vuln-type: os,library
          exit-code: '0'

      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-pr.sarif
          category: trivy-pr

  build-check:
    name: Build Verification
    runs-on: ubuntu-latest
    needs: [changes, backend-test, frontend-test, contract-consistency]
    if: always() && !failure() && !cancelled() && (needs.changes.outputs.backend == 'true' || needs.changes.outputs.frontend == 'true')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'

      - name: Build Backend
        run: |
          mvn -f platform-api/pom.xml clean install -DskipTests -q
          mvn -f platform-backend/pom.xml clean package -DskipTests -q
          mvn -f platform-fisco/pom.xml clean package -DskipTests -q
          mvn -f platform-storage/pom.xml clean package -DskipTests -q

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: platform-frontend/pnpm-lock.yaml

      - name: Build Frontend
        working-directory: platform-frontend
        run: |
          pnpm install --frozen-lockfile
          pnpm build
